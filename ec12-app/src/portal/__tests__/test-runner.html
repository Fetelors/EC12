<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EC12 Internal Notes — Test Runner</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      max-width: 800px;
      margin: 40px auto;
      padding: 20px;
      background: #f5f3ee;
      color: #050505;
    }
    h1 { font-weight: 500; margin-bottom: 8px; }
    .subtitle { color: #6b6964; margin-bottom: 32px; }
    .test-result {
      padding: 12px 16px;
      margin: 8px 0;
      border-radius: 8px;
      font-size: 14px;
    }
    .test-result.pass { background: rgba(10, 163, 154, 0.12); color: #0aa39a; }
    .test-result.fail { background: rgba(216, 64, 32, 0.12); color: #d84020; }
    .test-result .name { font-weight: 500; }
    .test-result .error { font-size: 12px; color: #6b6964; margin-top: 4px; }
    .summary {
      margin-top: 32px;
      padding: 20px;
      background: white;
      border-radius: 12px;
      border: 1px solid rgba(10,10,10,0.08);
    }
    .summary h2 { margin: 0 0 8px; font-weight: 500; }
    .summary .count { font-size: 32px; font-weight: 300; }
    .summary .count.all-pass { color: #0aa39a; }
    .summary .count.has-fail { color: #d84020; }
    button {
      padding: 12px 24px;
      background: #050505;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
      margin-bottom: 24px;
    }
    button:hover { background: #2e2e2c; }
    #results { margin-top: 16px; }
    .loading { color: #6b6964; font-style: italic; }
  </style>
</head>
<body>
  <h1>🧪 Internal Notes Feature Tests</h1>
  <p class="subtitle">Unit and integration tests for the e2e-test-feature</p>
  
  <button onclick="runTests()">Run All Tests</button>
  
  <div id="results"></div>
  <div id="summary"></div>

  <!-- Load dependencies in correct order -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" crossorigin></script>
  
  <!-- Load app code to get access to ARTISTS and components -->
  <script src="../data.js"></script>
  <script src="../components.jsx" type="text/babel"></script>
  <script src="../view-drawer.jsx" type="text/babel"></script>
  <script src="../view-itinerary.jsx" type="text/babel"></script>
  
  <!-- Load test file -->
  <script src="./internal-notes.test.js"></script>
  
  <script>
    async function runTests() {
      const resultsDiv = document.getElementById('results');
      const summaryDiv = document.getElementById('summary');
      
      resultsDiv.innerHTML = '<p class="loading">Running tests...</p>';
      summaryDiv.innerHTML = '';
      
      // Small delay to ensure all scripts are loaded
      await new Promise(r => setTimeout(r, 100));
      
      if (!window.InternalNotesTests) {
        resultsDiv.innerHTML = '<p class="test-result fail">Error: Test framework not loaded</p>';
        return;
      }
      
      const { passed, total, results } = await window.InternalNotesTests.run();
      
      // Render results
      resultsDiv.innerHTML = results.map(r => `
        <div class="test-result ${r.passed ? 'pass' : 'fail'}">
          <div class="name">${r.passed ? '✅' : '❌'} ${r.name}</div>
          ${r.error ? `<div class="error">${r.error}</div>` : ''}
        </div>
      `).join('');
      
      // Render summary
      const allPass = passed === total;
      summaryDiv.innerHTML = `
        <div class="summary">
          <h2>Test Summary</h2>
          <div class="count ${allPass ? 'all-pass' : 'has-fail'}">
            ${passed}/${total} tests passed
          </div>
        </div>
      `;
    }
    
    // Auto-run tests on load
    window.addEventListener('load', () => {
      setTimeout(runTests, 500);
    });
  </script>
</body>
</html>
